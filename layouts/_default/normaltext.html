{{ partial "header.html" . }}

<!-- Page Header -->
<div class="page-header">
    <h1>{{ .Title | markdownify }}</h1>
    {{ if .Description }}
    <p class="page-description">{{ .Description }}</p>
    {{ end }}
</div>

<!-- Page Content -->
<div class="page-content">
    {{ with .Content }}
    {{- . -}}
    {{ end }}
</div>

{{ partial "footer.html" . }}
